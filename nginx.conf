# Reference Nginx config for mi.zur-i.com on the EC2 host.
# Install to /etc/nginx/sites-available/mi and symlink to sites-enabled/.
# Certbot will rewrite this file when you run `certbot --nginx -d mi.zur-i.com`.

server {
    listen 80;
    server_name mi.zur-i.com;

    root /var/www/mi;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
